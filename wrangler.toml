name = "tukuriva-local"
compatibility_date = "2026-03-01"
pages_build_output_dir = "_site"


# NOTE: remote = true on r2_buckets connects local dev to the real R2 bucket instead of the empty local emulator (wrangler pages dev has no --remote flag).

[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "tukuriva"
remote = true
